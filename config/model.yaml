grid_search:
  class: GridSearchCV
  module: sklearn.model_selection
  params:
    cv: 3
    verbose: 3


model_selection:

  module_0:
    class: GradientBoostingClassifier
    module: sklearn.ensemble
    params:
      learning_rate: 0.1
      n_estimators: 100
      max_depth: 3
    search_param_grid:
      learning_rate:
        - 0.01
        - 0.05
        - 0.1
      n_estimators:
        - 50
        - 100
        - 200
      max_depth:
        - 2
        - 3


  module_1:
    class: RandomForestClassifier
    module: sklearn.ensemble
    params:
      max_depth: 10
      max_features: sqrt
      n_estimators: 100
    search_param_grid:
      max_depth:
        - 10
        - 15
        - 20
        - null
      max_features:
        - sqrt
        - log2
      n_estimators:
        - 50
        - 100
        - 200
